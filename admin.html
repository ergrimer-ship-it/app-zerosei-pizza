<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="manifest" href="./admin-manifest.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Meta Tags iOS/Safari -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZeroSei Admin" />

    <title>ZeroSei Admin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 360px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 24px;
            background: #D4AF37;
            color: #1a1a2e;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .install-hint {
            margin-top: 32px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
        }

        .install-hint strong {
            color: rgba(255, 255, 255, 0.65);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">⚙️</div>
        <h1>ZeroSei Admin</h1>
        <p class="subtitle">Pannello di gestione pizzeria</p>

        <a class="btn" href="/#/admin/login">
            Accedi al pannello →
        </a>

        <p class="install-hint" id="installHint">
            <strong>Come installare:</strong><br>
            Tocca <strong>Condividi</strong> (□↑) → <strong>"Aggiungi a schermata Home"</strong><br>
            per avere l'accesso rapido all'admin.
        </p>
    </div>

    <script>
        // Se già installata come PWA standalone, vai direttamente all'admin
        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            window.location.replace('/#/admin/login');
        } else {
            // In browser: nascondi il suggerimento se Chrome (ha già il suo banner)
            const isChrome = /Chrome/.test(navigator.userAgent) && !/Safari/.test(navigator.userAgent);
            if (isChrome) {
                document.getElementById('installHint').style.display = 'none';
            }
        }
    </script>
</body>

</html>
